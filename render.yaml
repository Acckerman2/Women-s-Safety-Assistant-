services:
  # ── Single Streamlit App (agent runs in-process) ────
  - type: web
    name: women-s-safety-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
