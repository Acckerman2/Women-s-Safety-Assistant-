services:
  # ── FastAPI Backend ──────────────────────────────────
  - type: web
    name: sheshield-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"

  # ── Streamlit Frontend ──────────────────────────────
  - type: web
    name: sheshield-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_URL
        value: "https://sheshield-api.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.11"
